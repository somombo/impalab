[[components]]
name = "meta-gen"
type = "generator"

[components.run]
command = "python3"
args = ["-c", "import base64; import json; print(f'meta:{base64.b64encode(json.dumps({'size': 100, 'label': 'test'}).encode()).decode()},1,2,3')"]

[[components]]
name = "meta-exec"
type = "executor"

[components.run]
command = "python3"
args = ["-c", "import sys; [print(line.split(',')[0] + ',42') for line in sys.stdin]"]
